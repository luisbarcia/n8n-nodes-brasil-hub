# n8n-nodes-brasil-hub Release Pipeline
# Publishes to npm when a GitHub release is created

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist structure
        run: |
          test -f dist/nodes/BrasilHub/BrasilHub.node.js
          test -f dist/nodes/BrasilHub/BrasilHub.node.json
          echo "Build artifacts verified"

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify community package scan
        run: npx @n8n/scan-community-package n8n-nodes-brasil-hub@${TAG#v}
        env:
          TAG: ${{ github.event.release.tag_name }}
