# n8n-nodes-brasil-hub Release Pipeline
# Build, attest provenance, and publish to npm

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist structure
        run: |
          test -f dist/nodes/BrasilHub/BrasilHub.node.js
          test -f dist/nodes/BrasilHub/BrasilHub.node.json
          echo "Build artifacts verified"

      - name: Pack tarball
        id: pack
        run: |
          npm pack
          echo "tarball=$(ls *.tgz)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: '*.tgz'

      - name: Upload tarball
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: npm-package
          path: '*.tgz'
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Download tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package

      - name: Publish to npm
        run: npm publish *.tgz --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify community package scan
        run: npx @n8n/scan-community-package n8n-nodes-brasil-hub@${TAG#v}
        env:
          TAG: ${{ github.event.release.tag_name }}
