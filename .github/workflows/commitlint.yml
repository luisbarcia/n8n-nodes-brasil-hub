# Enforce conventional commit format on PR titles
# Required for Release Please to correctly determine version bumps.
# Rejects PRs with titles like "fixed stuff" — requires "feat:", "fix:", etc.

name: Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  commitlint:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            test
            ci
            build
            style
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject "{subject}" doesn't match the expected pattern.
            Use conventional commits: "feat: add feature", "fix: correct bug", etc.
