# Automated release management via Release Please
# Creates a "Release PR" that accumulates conventional commits.
# When merged, it bumps version, updates CHANGELOG, creates tag + GitHub Release.
# The existing release.yml then publishes to npm.

name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
