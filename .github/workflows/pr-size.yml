# Label PRs by diff size (xs, s, m, l, xl)
# Helps prioritize code reviews — small PRs get reviewed faster.

name: PR Size

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  size-label:
    name: Label PR Size
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: CodelyTV/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 50
          m_label: 'size/m'
          m_max_size: 200
          l_label: 'size/l'
          l_max_size: 500
          xl_label: 'size/xl'
          fail_if_xl: false
          files_to_ignore: |
            package-lock.json
            CHANGELOG.md
            *.md
