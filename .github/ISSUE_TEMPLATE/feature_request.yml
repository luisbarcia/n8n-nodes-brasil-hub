name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature!
        Please fill out the details below.

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New Resource (e.g., Banks, FIPE, IBGE)
        - New Operation on Existing Resource
        - Enhancement to Existing Feature
        - New Provider/Fallback Source
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is this feature related to a problem? Describe it clearly.
      placeholder: "I need to query Brazilian bank data in my n8n workflow, but..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: api-sources
    attributes:
      label: API Sources
      description: If suggesting a new resource, list the public APIs that could be used.
      placeholder: |
        - BrasilAPI: https://brasilapi.com.br/api/...
        - Other API: https://...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or workflow examples.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing feature requests.
          required: true
        - label: I am willing to help implement this feature.
