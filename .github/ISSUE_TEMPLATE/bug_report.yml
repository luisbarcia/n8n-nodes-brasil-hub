name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
        Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of n8n-nodes-brasil-hub are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: input
    id: n8n-version
    attributes:
      label: n8n Version
      description: Which version of n8n are you running?
      placeholder: "e.g., 1.60.0"
    validations:
      required: true

  - type: dropdown
    id: resource
    attributes:
      label: Affected Resource
      description: Which resource is affected?
      options:
        - CNPJ
        - CEP
        - Other
    validations:
      required: true

  - type: dropdown
    id: operation
    attributes:
      label: Operation
      description: Which operation were you using?
      options:
        - Query
        - Validate
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a workflow with Brasil Hub node
        2. Set resource to CNPJ, operation to Query
        3. Enter CNPJ '...'
        4. Execute the workflow
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the node output or error message.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error logs or stack traces.
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - n8n Cloud
        - n8n Self-hosted (Docker)
        - n8n Self-hosted (npm)
        - n8n Desktop
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or workflow JSON exports.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues that describe this bug.
          required: true
        - label: I am using the latest version of the package.
